<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conway's Game of Life</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>Game of Life</h1>
            <p class="subtitle">Conway's Cellular Automaton</p>
        </header>

        <div class="toolbar">
            <div class="tool-group">
                <label class="select-wrapper">
                    <select id="ruleSelect">
                        <option value="conway">Conway's Life (B3/S23)</option>
                        <option value="highlife">HighLife (B36/S23)</option>
                        <option value="daynight">Day &amp; Night (B3678/S34678)</option>
                        <option value="anneal">Anneal (B4678/S35678)</option>
                    </select>
                </label>
            </div>

            <div class="tool-group playback">
                <button id="playPause" class="btn btn-primary">
                    <span class="icon">&#9654;</span> Start
                </button>
                <button id="step" class="btn">
                    <span class="icon">&#9197;</span> Step
                </button>
            </div>

            <div class="tool-group">
                <button id="randomize" class="btn">Random</button>
                <button id="clear" class="btn btn-danger">Clear</button>
            </div>

            <div class="tool-group speed">
                <label for="speed">Speed</label>
                <input type="range" id="speed" min="1" max="30" value="10">
                <span class="speed-value"><span id="speedLabel">10</span> /s</span>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>

        <footer class="stats">
            <div class="stat">
                <span class="stat-label">Generation</span>
                <span class="stat-value" id="generation">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Population</span>
                <span class="stat-value" id="population">0</span>
            </div>
        </footer>
    </div>
    <script src="game.js"></script>
</body>
</html>
